name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: alfredgibeau-ahoussinou
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update snake PNG on main
        run: |
          npm install @resvg/resvg-js --no-save
          node -e "
          const { Resvg } = require('@resvg/resvg-js');
          const fs = require('fs');
          const svg = fs.readFileSync('dist/github-contribution-grid-snake-dark.svg','utf8');
          fs.writeFileSync('snake.png', new Resvg(svg).render().asPng());
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p assets/png
          mv snake.png assets/png/snake.png
          git add assets/png/snake.png
          git diff --staged --quiet || git commit -m "chore: update snake contribution PNG"
          git push
