<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <rect width="900" height="200" rx="12" fill="#030712" stroke="#1e293b"/>
  <text x="28" y="36" font-family="monospace" font-size="12" fill="#06b6d4">parcours.timeline</text>
  <line x1="80" y1="110" x2="820" y2="110" stroke="#334155" stroke-width="2"/>
  <g font-family="monospace" font-size="10" fill="#94a3b8">
    <circle cx="100" cy="110" r="10" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
    <text x="100" y="145" text-anchor="middle">2023</text>
    <text x="100" y="162" text-anchor="middle" fill="#e2e8f0">Debut</text>
    <text x="100" y="176" text-anchor="middle" fill="#64748b">code</text>
    <circle cx="280" cy="110" r="10" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
    <text x="280" y="145" text-anchor="middle">2024</text>
    <text x="280" y="162" text-anchor="middle" fill="#e2e8f0">Holberton</text>
    <text x="280" y="176" text-anchor="middle" fill="#64748b">C / Python</text>
    <circle cx="460" cy="110" r="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="3"/>
    <text x="460" y="145" text-anchor="middle">2025</text>
    <text x="460" y="162" text-anchor="middle" fill="#c4b5fd">Web stack</text>
    <text x="460" y="176" text-anchor="middle" fill="#64748b">React / APIs</text>
    <circle cx="640" cy="110" r="10" fill="#0f172a" stroke="#ec4899" stroke-width="2"/>
    <text x="640" y="145" text-anchor="middle">2026</text>
    <text x="640" y="162" text-anchor="middle" fill="#e2e8f0">Fullstack</text>
    <text x="640" y="176" text-anchor="middle" fill="#64748b">TypeScript</text>
    <circle cx="820" cy="110" r="10" fill="#0f172a" stroke="#22c55e" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="820" y="145" text-anchor="middle">NOW</text>
    <text x="820" y="162" text-anchor="middle" fill="#4ade80">Ship</text>
    <text x="820" y="176" text-anchor="middle" fill="#64748b">products</text>
  </g>
  <polyline points="100,110 280,110 460,110 640,110 820,110" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
</svg>
