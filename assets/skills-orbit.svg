<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0e17" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="500" height="500" fill="#0a0e17" rx="16"/>

  <circle cx="250" cy="250" r="180" fill="url(#core)"/>
  <circle cx="250" cy="250" r="165" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.3" stroke-dasharray="6 10">
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="30s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="250" r="120" fill="none" stroke="#f472b6" stroke-width="0.8" opacity="0.25" stroke-dasharray="3 14">
    <animateTransform attributeName="transform" type="rotate" from="360 250 250" to="0 250 250" dur="22s" repeatCount="indefinite"/>
  </circle>

  <!-- Centre -->
  <circle cx="250" cy="250" r="45" fill="#111827" stroke="url(#ring)" stroke-width="2">
    <animate attributeName="r" values="43;47;43" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="250" y="245" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">STACK</text>
  <text x="250" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">LIVE</text>

  <!-- Orbite 1 : React, TS, Node -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="20s" repeatCount="indefinite"/>
    <g transform="translate(250,85)">
      <circle r="28" fill="#1e293b" stroke="#61dafb" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#61dafb" font-weight="700">React</text>
    </g>
    <g transform="translate(415,250)">
      <circle r="28" fill="#1e293b" stroke="#3178c6" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3178c6" font-weight="700">TypeScript</text>
    </g>
    <g transform="translate(250,415)">
      <circle r="28" fill="#1e293b" stroke="#339933" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#339933" font-weight="700">Node</text>
    </g>
    <g transform="translate(85,250)">
      <circle r="28" fill="#1e293b" stroke="#3776ab" stroke-width="1.5"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3776ab" font-weight="700">Python</text>
    </g>
  </g>

  <!-- Orbite 2 inverse -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 250 250" to="0 250 250" dur="14s" repeatCount="indefinite"/>
    <g transform="translate(250,145)">
      <circle r="22" fill="#1e293b" stroke="#e34f26" stroke-width="1"/>
      <text y="4" text-anchor="middle" font-size="9" fill="#e34f26" font-family="system-ui,sans-serif">HTML</text>
    </g>
    <g transform="translate(355,355)">
      <circle r="22" fill="#1e293b" stroke="#1572b6" stroke-width="1"/>
      <text y="4" text-anchor="middle" font-size="9" fill="#1572b6" font-family="system-ui,sans-serif">CSS</text>
    </g>
    <g transform="translate(145,355)">
      <circle r="22" fill="#1e293b" stroke="#f7df1e" stroke-width="1"/>
      <text y="4" text-anchor="middle" font-size="9" fill="#f7df1e" font-family="system-ui,sans-serif">JS</text>
    </g>
    <g transform="translate(145,145)">
      <circle r="22" fill="#1e293b" stroke="#0175c2" stroke-width="1"/>
      <text y="4" text-anchor="middle" font-size="9" fill="#0175c2" font-family="system-ui,sans-serif">Dart</text>
    </g>
  </g>

  <!-- Lignes de connexion pulse -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.2">
    <line x1="250" y1="250" x2="250" y2="113">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="250" x2="387" y2="250">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="250" x2="250" y2="387">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="250" x2="113" y2="250">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="250" y="485" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">const skills = orbit(Infinity);</text>
</svg>
